<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن جواهر فري فاير مجانا</title>
    <!-- Font Awesome للأيقونات + خط عربي عصري -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #1a1f2e, #0b0d17);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة (كرات ضبابية) */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 30% 40%, rgba(147, 112, 219, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 191, 255, 0.12) 0%, transparent 45%),
                        radial-gradient(circle at 20% 80%, #8a2be2 0%, transparent 50%);
            animation: slowDrift 25s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes slowDrift {
            0% { transform: translate(-3%, -3%) rotate(0deg); opacity: 0.7; }
            100% { transform: translate(3%, 3%) rotate(3deg); opacity: 1; }
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(18, 22, 35, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 48px;
            padding: 2.2rem 1.8rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            z-index: 2;
            transition: transform 0.3s;
            animation: floatIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* العنوان الرئيسي */
        .main-title {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .main-title h1 {
            font-size: 2.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f3e9ff, #d9b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px #b77eff;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .main-title h1 i {
            font-size: 2.6rem;
            color: #d9b0ff;
            filter: drop-shadow(0 0 10px #b77eff);
        }

        /* مؤشر الخطوات */
        .step-progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .step-progress::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.06);
            z-index: 1;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: #1e2437;
            border: 2px solid #2c324a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6f7a9e;
            font-weight: 700;
            font-size: 1.1rem;
            position: relative;
            z-index: 2;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .step.active {
            background: #b886ff;
            border-color: #d4a5ff;
            color: #0b0d17;
            box-shadow: 0 0 20px #b886ff, 0 0 40px #8a2be2;
            transform: scale(1.12);
        }

        .step i {
            font-size: 1.2rem;
        }

        .step-label {
            position: absolute;
            top: 48px;
            font-size: 0.7rem;
            color: #a0a8c2;
            white-space: nowrap;
            background: rgba(0,0,0,0.4);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .step.active .step-label {
            opacity: 1;
        }

        /* الصفحات (كل صفحة عبارة عن حاوية منفصلة) */
        .page {
            display: none;
            flex-direction: column;
            gap: 2rem;
            animation: pageSwitch 0.5s ease;
        }

        .page.active {
            display: flex;
        }

        @keyframes pageSwitch {
            0% { opacity: 0.3; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        h2 {
            color: white;
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(180, 130, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h2 i {
            font-size: 2.2rem;
            color: #d9b0ff;
            filter: drop-shadow(0 0 8px #b77eff);
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #9f8bc9;
            font-size: 1.3rem;
            pointer-events: none;
            transition: all 0.2s;
        }

        input, .captcha-box {
            width: 100%;
            background: rgba(12, 15, 25, 0.7);
            border: 1.5px solid #2f3553;
            border-radius: 60px;
            padding: 1.1rem 3rem 1.1rem 1.8rem;
            font-size: 1.2rem;
            color: white;
            transition: all 0.25s;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        input:focus {
            outline: none;
            border-color: #b77eff;
            box-shadow: 0 0 25px #b77eff, 0 8px 20px black;
        }

        input:focus + i {
            color: #d6adff;
            text-shadow: 0 0 10px #b77eff;
        }

        /* منع الأسهم في حقل الرقم */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* بوتون أنيق */
        .glow-btn {
            background: linear-gradient(135deg, #9f5cf1, #6b3aff);
            border: none;
            border-radius: 60px;
            padding: 1rem 2rem;
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px #6d3cce, 0 0 20px #a06eff;
            transition: all 0.25s;
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            margin-top: 1rem;
        }

        .glow-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #b27aff, #7f4eff);
            box-shadow: 0 15px 40px #8c4eff, 0 0 35px #c39aff;
        }

        .glow-btn:active {
            transform: scale(0.98);
        }

        .glow-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* حاوية اختيار الكمية (جواهر) */
        .quantity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin: 0.5rem 0;
        }

        .diamond-card {
            background: rgba(25, 28, 45, 0.8);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(200, 160, 255, 0.15);
            border-radius: 32px;
            padding: 1.4rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        .diamond-card i {
            font-size: 3rem;
            color: #edf0ff;
            text-shadow: 0 0 30px #b300ff, 0 0 15px #b77eff;
            transition: all 0.3s;
        }

        .diamond-card span {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
        }

        .diamond-card small {
            font-size: 1rem;
            color: #cbb3ff;
        }

        .diamond-card:hover {
            border-color: #c88aff;
            transform: translateY(-6px) scale(1.02);
            background: rgba(45, 35, 75, 0.9);
            box-shadow: 0 20px 40px #5f30b3;
        }

        .diamond-card.selected {
            border: 3px solid #ca9aff;
            background: rgba(65, 40, 120, 0.9);
            box-shadow: 0 0 40px #b77eff;
        }

        /* كابتشا بتصميم عصري */
        .captcha-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 80px;
            padding: 0.6rem 1.8rem;
            border: 1px solid #3d3458;
        }

        .captcha-checkbox {
            appearance: none;
            width: 32px;
            height: 32px;
            background: #1c1f31;
            border: 2px solid #6a5c8a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .captcha-checkbox:checked {
            background: #9c4eff;
            border-color: #dbbaff;
            box-shadow: 0 0 25px #b77eff;
        }

        .captcha-checkbox:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.2rem;
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .captcha-text {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .loader {
            width: 28px;
            height: 28px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #c78aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* رسالة النجاح */
        .success-container {
            text-align: center;
            padding: 1.5rem 0;
        }

        .success-icon {
            font-size: 5rem;
            color: #b77eff;
            filter: drop-shadow(0 0 30px #b77eff);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.07); }
            100% { opacity: 0.9; transform: scale(1); }
        }

        .success-message {
            font-size: 2.3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #d9c3ff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1rem 0;
        }

        .note {
            color: #a79ec5;
            font-size: 0.95rem;
            margin-top: 2rem;
            border-top: 1px dashed #3f3b55;
            padding-top: 1.5rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
            color: #4c4466;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- العنوان الرئيسي -->
        <div class="main-title">
            <h1>
                <i class="fas fa-gem"></i>
                شحن جواهر فري فاير مجانا
                <i class="fas fa-gem"></i>
            </h1>
        </div>

        <!-- مؤشر التقدم (خطوات أنيقة) -->
        <div class="step-progress">
            <div class="step" id="step1"><i class="fas fa-id-card"></i><span class="step-label">الحساب</span></div>
            <div class="step" id="step2"><i class="fas fa-user"></i><span class="step-label">المستخدم</span></div>
            <div class="step" id="step3"><i class="fas fa-gem"></i><span class="step-label">الكمية</span></div>
            <div class="step" id="step4"><i class="fas fa-robot"></i><span class="step-label">تحقق</span></div>
        </div>

        <!-- الصفحة 1: إدخال الآي دي (أرقام فقط) -->
        <div id="page1" class="page active">
            <h2><i class="fas fa-dragon"></i> أدخل معرفك</h2>
            <div class="input-wrapper">
                <i class="fas fa-hashtag"></i>
                <input type="text" id="playerId" inputmode="numeric" pattern="\d*" placeholder="مثال: 123456789" maxlength="12" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <button class="glow-btn" onclick="nextPage(1)"><i class="fas fa-arrow-left"></i> التالي</button>
            <div class="note"><i class="fas fa-shield-alt"></i> أدخل رقم الآي دي المكون من أرقام فقط.</div>
        </div>

        <!-- الصفحة 2: اسم المستخدم -->
        <div id="page2" class="page">
            <h2><i class="fas fa-at"></i> اسم المستخدم</h2>
            <div class="input-wrapper">
                <i class="fas fa-pen-fancy"></i>
                <input type="text" id="username" placeholder="أدخل اسمك داخل اللعبة">
            </div>
            <button class="glow-btn" onclick="nextPage(2)"><i class="fas fa-arrow-left"></i> التالي</button>
        </div>

        <!-- الصفحة 3: اختيار كمية الجواهر (أيقونات + كميات ضخمة) -->
        <div id="page3" class="page">
            <h2><i class="fas fa-gem"></i> اختر الكمية</h2>
            <div class="quantity-grid">
                <div class="diamond-card" onclick="selectQuantity(5000)">
                    <i class="fas fa-gem"></i>
                    <span>5k</span>
                    <small>جواهر</small>
                </div>
                <div class="diamond-card" onclick="selectQuantity(20000)">
                    <i class="fas fa-gem"></i>
                    <span>20k</span>
                    <small>جواهر</small>
                </div>
                <div class="diamond-card" onclick="selectQuantity(50000)">
                    <i class="fas fa-gem"></i>
                    <span>50k</span>
                    <small>جواهر</small>
                </div>
                <div class="diamond-card" onclick="selectQuantity(100000)">
                    <i class="fas fa-gem"></i>
                    <span>100k</span>
                    <small>جواهر</small>
                </div>
                <div class="diamond-card" onclick="selectQuantity(250000)">
                    <i class="fas fa-gem"></i>
                    <span>250k</span>
                    <small>جواهر</small>
                </div>
                <div class="diamond-card" onclick="selectQuantity(500000)">
                    <i class="fas fa-gem"></i>
                    <span>500k</span>
                    <small>جواهر</small>
                </div>
            </div>
            <button class="glow-btn" onclick="nextPage(3)" id="nextFromQty" disabled><i class="fas fa-arrow-left"></i> التالي</button>
        </div>

        <!-- الصفحة 4: التحقق (كابتشا) + شحن -->
        <div id="page4" class="page">
            <h2><i class="fas fa-shield-hal"></i> لست روبوتاً</h2>
            <div class="captcha-area">
                <input type="checkbox" id="captchaCheckbox" class="captcha-checkbox">
                <span class="captcha-text">أنا لست روبوت</span>
                <i class="fas fa-sparkles" style="color:#c58aff; margin-right: auto;"></i>
            </div>
            <button class="glow-btn" onclick="fakeVerification()" id="verifyBtn"><i class="fas fa-fingerprint"></i> تحقق واشحن</button>
        </div>

        <!-- صفحة النجاح (تظهر بعد التحقق) -->
        <div id="successPage" class="page">
            <div class="success-container">
                <i class="fas fa-circle-check success-icon"></i>
                <div class="success-message">تم الشحن بنجاح!</div>
                <i class="fas fa-gem" style="font-size: 3rem; color: #f2e9ff; margin: 1rem 0;"></i>
                <p style="color: #cfc1f0; font-size: 1.3rem;">ألف جواهر إضافية بانتظارك</p>
                <button class="glow-btn" onclick="resetToHome()" style="margin-top: 2rem;"><i class="fas fa-home"></i> متابعة</button>
            </div>
        </div>

        <div class="footer-links">
            <span><i class="fas fa-diamond"></i> شحن آمن وسريع</span>
        </div>
    </div>

    <script>
        let currentPage = 1;          // 1,2,3,4,5 (5 هي صفحة النجاح)
        let selectedQty = 0;
        const totalPages = 4;

        // تحديث عرض الخطوات
        function updateSteps() {
            for (let i = 1; i <= totalPages; i++) {
                const stepEl = document.getElementById('step'+i);
                if (i === currentPage) {
                    stepEl.classList.add('active');
                } else {
                    stepEl.classList.remove('active');
                }
            }
        }

        // إظهار صفحة معينة وإخفاء الباقي
        function showPage(pageNum) {
            // إخفاء كل الصفحات
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if (pageNum <= totalPages) {
                document.getElementById('page' + pageNum).classList.add('active');
                currentPage = pageNum;
            } else if (pageNum === 5) { // صفحة النجاح
                document.getElementById('successPage').classList.add('active');
                currentPage = 5;
            }
            updateSteps();
        }

        // الانتقال إلى الصفحة التالية مع validation
        function nextPage(fromPage) {
            if (fromPage === 1) {
                const idInput = document.getElementById('playerId');
                if (!idInput.value.trim()) {
                    alert('الرجاء إدخال معرف اللاعب (أرقام فقط)');
                    return;
                }
                if (!/^\d+$/.test(idInput.value)) {
                    alert('يجب أن يحتوي المعرف على أرقام فقط');
                    return;
                }
                showPage(2);
            }
            else if (fromPage === 2) {
                const nameInput = document.getElementById('username');
                if (!nameInput.value.trim()) {
                    alert('الرجاء إدخال اسم المستخدم');
                    return;
                }
                showPage(3);
            }
            else if (fromPage === 3) {
                if (selectedQty === 0) {
                    alert('الرجاء اختيار كمية الجواهر');
                    return;
                }
                showPage(4);
            }
        }

        // اختيار كمية الجواهر (تحديد البطاقة)
        function selectQuantity(qty) {
            selectedQty = qty;
            // إزالة كلاس selected من جميع البطاقات
            document.querySelectorAll('.diamond-card').forEach(card => card.classList.remove('selected'));
            // نضيف selected للبطاقة المختارة (باستخدام الحدث)
            event.currentTarget.classList.add('selected');
            // تفعيل زر التالي في صفحة 3
            document.getElementById('nextFromQty').disabled = false;
        }

        // محاكاة التحقق + شحن ناجح بعد وقت قصير
        function fakeVerification() {
            const captcha = document.getElementById('captchaCheckbox');
            if (!captcha.checked) {
                alert('يرجى تأكيد أنك لست روبوت');
                return;
            }

            const btn = document.getElementById('verifyBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الشحن...';
            btn.disabled = true;

            // محاكاة وقت قصير (ثانيتين)
            setTimeout(() => {
                // إظهار صفحة النجاح
                showPage(5);
                // إعادة زر التحقق لحالته (للاستخدام مرة أخرى إذا رجع)
                btn.innerHTML = originalText;
                btn.disabled = false;
                // اختياري: إلغاء تحديد checkbox
                document.getElementById('captchaCheckbox').checked = false;
            }, 1800); // 1.8 ثانية
        }

        // العودة للصفحة الرئيسية (الصفحة 1) عند الضغط على متابعة
        function resetToHome() {
            // إعادة تعيين الحقول
            document.getElementById('playerId').value = '';
            document.getElementById('username').value = '';
            selectedQty = 0;
            document.querySelectorAll('.diamond-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('nextFromQty').disabled = true;
            document.getElementById('captchaCheckbox').checked = false;

            showPage(1);
        }

        // التأكد من أن الأيدي فقط أرقام (حتى عند اللصق)
        document.getElementById('playerId').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // تهيئة أولية
        updateSteps();
    </script>
</body>
</html>
